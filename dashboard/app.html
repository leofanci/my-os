<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/vendor/xterm.css">
<script src="/vendor/xterm.js"></script>
<script src="/vendor/xterm-addon-fit.js"></script>
</head>
<body>
<div class="titlebar"></div>
<div class="app" id="app">
  <aside class="panel side" id="rail"></aside>
  <div class="right-col">
    <section class="panel main" id="main"><div class="scroll"><div style="padding:30px;color:var(--dim)">loading…</div></div></section>
    <div class="panel term-panel" id="term-panel">
      <div class="tbar" id="term-tab"><span id="term-chevron">▸</span>&nbsp;Terminal
        <span class="thint">full claude · all skills</span>
        <button class="tclose" id="term-close" title="Toggle terminal">open ⌃`</button></div>
      <div class="term-mount" id="term"></div>
    </div>
  </div>
  <aside class="panel chat-dock" id="chat-dock">
    <div class="dock-bar">
      <span class="av"></span>
      <div><b>Chat</b><span class="sm" id="chat-status">Ready</span></div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="term-btn" id="chat-clear" title="Clear chat history">⌫</button>
        <button class="term-btn" id="chat-move" title="Move chat to bottom-left">⇲</button>
        <button class="term-btn" id="chat-hide" title="Hide chat">✕</button>
      </div>
    </div>
    <div class="stream" id="chat-stream"></div>
    <div class="compose">
      <div class="attachments" id="attachments"></div>
      <div class="ibox">
        <button class="attach-btn" id="attach-btn" title="Attach file">⊕</button>
        <input type="file" id="file-input" multiple style="display:none">
        <textarea id="chat-input" placeholder="Ask the OS to create or change things…" rows="1"></textarea>
        <button class="send" id="chat-send">↑</button>
      </div>
    </div>
  </aside>
</div>
<button class="chat-reopen" id="chat-reopen">💬 Chat</button>
<div id="toast" style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(27,31,39,.92);color:#fff;padding:10px 16px;border-radius:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30"></div>
<script src="/app.js"></script>
</body>
</html>
