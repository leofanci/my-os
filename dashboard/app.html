<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --canvas:#e9ecf1;
    --ink:#1b1f27; --ink2:#444b58; --dim:#828a98;
    --graphite:#323a47; --graphite-soft:rgba(50,58,71,.08);
    --sky:#2f80ed; --sky-soft:rgba(47,128,237,.12);
    --teal:#17916f; --teal-soft:rgba(23,145,111,.13);
    --amber:#c98a1a; --amber-soft:rgba(201,138,26,.16);
    --glass:rgba(255,255,255,.60); --glass2:rgba(255,255,255,.78);
    --gline:rgba(255,255,255,.78); --hair:rgba(27,31,39,.08);
    --shadow:0 1px 2px rgba(30,40,60,.05),0 18px 40px -20px rgba(30,45,70,.30);
    --disp:"Avenir Next","Avenir",ui-sans-serif,system-ui,sans-serif;
    --body:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.5 var(--body);color:var(--ink);height:100vh;overflow:hidden;background:var(--canvas)}
  .app{display:grid;grid-template-columns:232px 1fr 400px;grid-template-rows:minmax(0,1fr);gap:14px;height:100vh;padding:14px;
       grid-template-areas:"nav center chat"}
  #rail{grid-area:nav} .right-col{grid-area:center} #chat-dock{grid-area:chat}
  /* chat docked bottom-left: it sits under the nav; center spans both rows */
  .app.chat-bl{grid-template-columns:232px 1fr;grid-template-rows:1fr 300px;
       grid-template-areas:"nav center" "chat center"}
  /* chat hidden entirely */
  .app.chat-hidden{grid-template-columns:232px 1fr;grid-template-areas:"nav center"}
  .app.chat-hidden #chat-dock{display:none}
  .right-col{display:flex;flex-direction:column;gap:14px;min-height:0;overflow:hidden}
  .panel{background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);
    border:1px solid var(--gline);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
  .label{font:600 10px/1 var(--body);text-transform:uppercase;letter-spacing:.13em;color:var(--dim)}

  /* ---------- left ---------- */
  .side{padding:18px 13px;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:2px 6px 14px;position:relative;cursor:pointer;border-radius:10px}
  .brand:hover{background:rgba(255,255,255,.5)}
  .brand .mark{width:24px;height:24px;border-radius:9px;background:var(--graphite);flex-shrink:0}
  .brand b{font:700 15px/1 var(--disp)}
  .brand-menu{position:absolute;top:calc(100% - 4px);left:0;min-width:140px;background:#fff;border:1px solid var(--hair);
    border-radius:12px;box-shadow:0 4px 24px rgba(30,40,60,.14);padding:5px;z-index:50;display:none}
  .brand-menu.open{display:block}
  .brand-menu a{display:block;padding:7px 11px;border-radius:8px;font-size:12.5px;color:var(--ink2);cursor:pointer;text-decoration:none}
  .brand-menu a:hover{background:var(--graphite-soft)}
  .navlabel{padding:14px 8px 6px}
  .nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:13px;color:var(--ink2);
    text-decoration:none;cursor:pointer;font-size:12.5px}
  .nav a .ico{width:15px;text-align:center;color:var(--dim)}
  .nav a .c{margin-left:auto;font-size:11px;color:var(--dim)}
  .nav a:hover{background:rgba(255,255,255,.6)}
  .nav a.active{background:#fff;color:var(--sky);font-weight:600}
  .nav a.active .ico{color:var(--sky)}
  .vent{margin-top:10px;padding:11px 12px;border-radius:16px;background:rgba(255,255,255,.55);border:1px solid var(--gline)}
  .vent .h{display:flex;align-items:center;gap:8px;font:600 13.5px/1 var(--disp)}
  .vent .h .tag{margin-left:auto;font:600 9.5px/1 var(--body);letter-spacing:.06em;text-transform:uppercase;
    color:var(--sky);background:var(--sky-soft);padding:3px 7px;border-radius:20px}
  .sub{margin-top:8px;display:flex;flex-direction:column;gap:1px}
  .sub a{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:11px;color:var(--ink2);
    text-decoration:none;cursor:pointer;font-size:12.5px}
  .sub a:hover{background:rgba(255,255,255,.6)}
  .sub a.active{background:#fff;color:var(--sky);font-weight:600}
  .sub .kid{margin-left:13px;color:var(--dim);font-size:12px}
  .sub .kid.active{color:var(--sky)}
  .sub .kid .cnt{margin-left:auto;font-size:11px;opacity:.8}
  .grp{margin:3px 0 1px;padding:8px 9px 2px;font:600 9.5px/1 var(--body);text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
  .kid{margin-left:12px;border-left:1px solid var(--hair);padding-left:9px}
  .kid a{color:var(--dim);font-size:12px}
  .kid a.active{color:var(--sky)}
  .sec a{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:10px;color:var(--ink2);text-decoration:none;cursor:pointer;font-size:12.5px}
  .sec a .ico{width:15px;text-align:center;color:var(--dim)}
  .sec a:hover{background:rgba(255,255,255,.6)}
  .sec a.active{background:#fff;color:var(--sky);font-weight:600}
  .sec a .c{margin-left:auto;font-size:11px;color:var(--dim)}

  /* ---------- center ---------- */
  .main{display:flex;flex-direction:column;background:var(--glass2);flex:1;min-height:0}
  .topbar{padding:20px 24px 16px;display:flex;align-items:flex-end;gap:12px;border-bottom:1px solid var(--hair)}
  .crumbs{font-size:11.5px;color:var(--dim)}.crumbs b{color:var(--ink2)}
  h1.title{font:700 23px/1.02 var(--disp);letter-spacing:-.015em;margin:6px 0 0}
  .titlemeta{font-size:11.5px;color:var(--dim);margin-top:6px}
  .btn{border:1px solid var(--hair);background:rgba(255,255,255,.72);color:var(--ink);padding:9px 14px;
    border-radius:13px;cursor:pointer;font:600 12px/1 var(--body)}
  .btn.primary{background:var(--graphite);color:#fff;border:0}
  .scroll{overflow:auto;padding:18px 24px 28px;flex:1;min-height:0}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .seg{display:inline-flex;background:rgba(255,255,255,.6);border:1px solid var(--gline);border-radius:14px;padding:3px}
  .seg span{padding:7px 14px;border-radius:11px;font-size:12px;color:var(--dim);cursor:pointer;font-weight:500}
  .seg span.on{background:#fff;color:var(--sky);font-weight:600}
  .mix{font-size:11.5px;color:var(--dim)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  .c{background:rgba(255,255,255,.66);border:1px solid var(--gline);border-radius:20px;padding:16px;position:relative}
  .c .ribbon{position:absolute;top:14px;right:14px;width:9px;height:9px;border-radius:50%;background:var(--sky)}
  .c.full .ribbon{background:var(--teal)}
  .c .top{display:flex;gap:6px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
  .tag{font:600 10px/1 var(--body);padding:4px 9px;border-radius:20px;background:rgba(27,31,39,.06);color:var(--dim)}
  .tag.tt{background:#1b1620;color:#fff}.tag.ig{background:rgba(190,30,116,.12);color:#b81e74}
  .tag.go{background:var(--teal-soft);color:var(--teal)}
  .c h4{margin:0 0 6px;font:600 14px/1.28 var(--disp)}
  .c .ex{font-size:12px;color:var(--ink2);line-height:1.55}.c .ex b{color:var(--ink)}
  .c .foot{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
  .mini{font:600 11px/1 var(--body);border:1px solid var(--hair);background:rgba(255,255,255,.72);border-radius:10px;
    padding:7px 10px;cursor:pointer;color:var(--ink2)}
  .mini.acc{border:0;background:var(--sky-soft);color:var(--sky)}
  .grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 16px}
  .kv{background:rgba(255,255,255,.6);border:1px solid var(--gline);border-radius:12px;padding:11px 13px}
  .kv span{display:block;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .kv b{font:600 14px/1.2 var(--disp)}
  .pcard{background:rgba(255,255,255,.66);border:1px solid var(--gline);border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .pcard h4{margin:0 0 6px;font:600 13.5px/1.2 var(--disp)}
  .rowc{display:flex;flex-direction:column;gap:9px}
  .post{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.66);border:1px solid var(--gline);border-radius:14px;padding:12px 14px}
  .post .t{font:600 13px/1.3 var(--disp);flex:1;min-width:0}
  .post .t small{display:block;color:var(--dim);font-weight:500;font-size:11px;margin-top:2px}
  .stp{font:600 10px/1 var(--body);padding:4px 9px;border-radius:20px;white-space:nowrap}
  .stp.idea{background:var(--amber-soft);color:var(--amber)} .stp.draft{background:rgba(124,92,214,.16);color:#7c5cd6}
  .stp.ready{background:var(--sky-soft);color:var(--sky)} .stp.sched{background:var(--teal-soft);color:var(--teal)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,33,.34);backdrop-filter:blur(2px);z-index:40;display:flex;align-items:center;justify-content:center}
  .modal{background:#fff;border:1px solid var(--gline);border-radius:18px;box-shadow:var(--shadow);width:min(440px,92vw);padding:20px 22px}
  .modal h3{font:700 15px/1.2 var(--disp);margin:0 0 12px}
  .modal label{display:block;font-size:11px;color:var(--dim);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.06em}
  .modal input,.modal textarea{width:100%;border:1px solid var(--hair);border-radius:10px;padding:9px 11px;font:inherit;background:rgba(255,255,255,.9)}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  .filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin:6px 0 14px}
  .chip{font:600 11.5px/1 var(--body);padding:7px 12px;border-radius:20px;background:rgba(255,255,255,.6);border:1px solid var(--gline);color:var(--dim);cursor:pointer}
  .chip.on{background:var(--graphite);color:#fff;border-color:var(--graphite)}
  .chip .n{opacity:.7;margin-left:5px}
  .gl{margin-left:auto;font-size:12px;color:var(--sky);cursor:pointer}
  .pl{font:600 10px/1 var(--body);padding:4px 8px;border-radius:6px;background:#1b1620;color:#fff;white-space:nowrap}
  .pl.ig{background:rgba(190,30,116,.12);color:#b81e74}
  .post .go{border:0;background:var(--sky-soft);color:var(--sky);font:600 11.5px/1 var(--body);padding:8px 12px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .post .more{color:var(--sky);cursor:pointer;padding:5px 10px;font:600 11.5px/1 var(--body);border-radius:8px;background:var(--sky-soft);border:0;white-space:nowrap}
  .chan-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .chan-chip{font:500 10px/1 var(--body);padding:3px 8px;border-radius:20px;background:var(--graphite-soft);color:var(--ink2);border:1px solid var(--hair)}
  .chan-pill-wrap{display:inline-flex;align-items:stretch;border-radius:20px;background:rgba(255,255,255,.7);border:1px solid var(--gline);overflow:hidden}
  .chan-pill{font:600 12px/1 var(--body);padding:6px 11px;background:transparent;border:0;color:var(--ink2);cursor:pointer}
  .chan-pill.on{background:var(--graphite);color:#fff}
  .chan-pill-wrap.on{border-color:var(--graphite)}
  .chan-gear{padding:5px 9px;background:transparent;border:0;border-left:1px solid var(--gline);color:var(--dim);cursor:pointer;font-size:12px;line-height:1}
  .chan-gear:hover{background:var(--sky-soft);color:var(--sky)}

  /* ---------- right dock: AI chat ---------- */
  .chat-dock{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .dock-bar{height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--hair);flex-shrink:0;user-select:none}
  .dock-bar .av{width:26px;height:26px;border-radius:9px;background:var(--graphite);flex-shrink:0;position:relative}
  .dock-bar .av::after{content:"";position:absolute;inset:7px 6px auto 6px;height:2px;background:rgba(255,255,255,.9);box-shadow:0 4px 0 rgba(255,255,255,.55),0 8px 0 rgba(255,255,255,.3)}
  .dock-bar b{font:700 13px/1 var(--disp)}
  .dock-bar .sm{font-size:10.5px;color:var(--dim);display:block;margin-top:3px}
  .term-btn{border:0;background:rgba(255,255,255,.6);color:var(--dim);border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
  .term-btn:hover{background:#fff;color:var(--ink)}
  /* tool-use activity chip in chat */
  .tool-chip{align-self:flex-start;font:600 10.5px/1.2 var(--body);background:var(--graphite-soft);color:var(--ink2);border:1px solid var(--hair);border-radius:12px;padding:5px 10px}
  /* floating reopen pill shown when the chat is collapsed */
  .chat-reopen{position:fixed;top:22px;right:22px;z-index:25;border:1px solid var(--gline);background:var(--glass2);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--ink2);border-radius:13px;padding:9px 13px;
    cursor:pointer;font:600 12px/1 var(--body);display:none;box-shadow:var(--shadow)}
  .app.chat-hidden ~ .chat-reopen{display:block}
  /* ---------- bottom: integrated terminal (always-visible toggle strip) ---------- */
  .term-panel{display:flex;flex-direction:column;flex-shrink:0;height:40px;background:#1e1e28;border-radius:18px;overflow:hidden;transition:height .14s ease}
  .term-panel.open{height:320px}
  .term-panel .tbar{height:40px;padding:0 14px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);
    color:#cfd3dc;font:600 11.5px/1 var(--body);letter-spacing:.03em;flex-shrink:0;cursor:pointer;user-select:none}
  .term-panel .tbar:hover{background:rgba(255,255,255,.11)}
  .term-panel .tbar .thint{margin-left:8px;color:#8a90a0;font-weight:500}
  .term-panel .tbar .tclose{margin-left:auto;border:0;background:rgba(255,255,255,.08);color:#cfd3dc;cursor:pointer;
    font:600 11px/1 var(--body);padding:5px 9px;border-radius:8px;line-height:1}
  .term-mount{flex:1;min-height:0;padding:6px 8px;display:none}
  .term-panel.open .term-mount{display:block}
  .attach-btn{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.55);border:1px solid var(--gline);color:var(--dim);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .attach-btn:hover{background:#fff;color:var(--sky)}
  .attachments{display:flex;gap:5px;flex-wrap:wrap;padding:6px 14px 0;min-height:0}
  .attachments:empty{display:none}
  .att-chip{font:600 10.5px/1 var(--body);background:var(--sky-soft);color:var(--sky);border-radius:20px;padding:4px 8px 4px 10px;display:flex;align-items:center;gap:4px}
  .att-chip button{border:0;background:none;color:inherit;cursor:pointer;font-size:11px;padding:0;opacity:.7;line-height:1}
  .stream{flex:1;overflow:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px}
  .ctx{align-self:flex-start;font:600 10px/1 var(--body);letter-spacing:.05em;text-transform:uppercase;
    background:rgba(255,255,255,.7);color:var(--ink2);padding:5px 11px;border-radius:20px;border:1px solid var(--gline)}
  .ctx b{color:var(--sky)}
  .msg{max-width:92%;font-size:12.5px;line-height:1.55}
  .msg.ai .b{background:rgba(255,255,255,.82);border:1px solid var(--gline);border-radius:17px 17px 17px 6px;padding:11px 13px}
  .msg.ai .b b{color:var(--sky)}
  .msg.me{align-self:flex-end}
  .msg.me .b{background:var(--graphite);color:#fff;border-radius:17px 17px 6px;padding:10px 13px}
  .sug{align-self:flex-start;font:600 11.5px/1.35 var(--body);border:1px solid var(--gline);background:rgba(255,255,255,.6);
    color:var(--sky);border-radius:13px;padding:8px 12px;cursor:pointer;text-align:left}
  .compose{padding:13px 14px;border-top:1px solid var(--hair)}
  .ref{font-size:10.5px;color:var(--dim);margin-bottom:8px}
  .ref b{background:var(--sky-soft);color:var(--sky);padding:2px 7px;border-radius:7px;font-weight:600}
  .ibox{display:flex;gap:8px;align-items:flex-end}
  .ibox textarea{flex:1;border:1px solid var(--gline);border-radius:14px;padding:11px 13px;font:inherit;resize:none;
    height:42px;background:rgba(255,255,255,.84)}
  .send{width:42px;height:42px;border-radius:14px;background:var(--graphite);color:#fff;border:0;cursor:pointer;font-size:16px}
  .note{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(27,31,39,.86);color:#fff;
    font-size:11.5px;padding:8px 15px;border-radius:20px}
  .cal-head{display:flex;align-items:center;gap:10px;margin:10px 0 12px}
  .cal-head .mlabel{font:700 16px/1 var(--disp)}
  .cal-nav{display:flex;gap:6px;margin-left:auto}
  .cal-nav button{border:1px solid var(--hair);background:rgba(255,255,255,.7);border-radius:10px;padding:6px 11px;cursor:pointer;font:600 12px/1 var(--body);color:var(--ink)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .dow{font:600 10px/1 var(--body);text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:2px 4px 4px}
  .day{min-height:84px;border:1px solid var(--hair);border-radius:12px;padding:6px 7px;background:rgba(255,255,255,.45)}
  .day.out{background:transparent;opacity:.5}
  .day .n{font:600 11px/1 var(--body);color:var(--dim);margin-bottom:5px}
  .day.today{border-color:var(--sky);box-shadow:0 0 0 2px var(--sky-soft)}
  .day.today .n{color:var(--sky)}
  .ev{font-size:10.5px;border-radius:6px;padding:3px 6px;margin-bottom:3px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev.post{background:var(--sky-soft);color:var(--sky)}
  .ev.experiment{background:rgba(124,92,214,.16);color:#7c5cd6}
  .ev.feature{background:var(--teal-soft);color:var(--teal)}
  .ev.activity{background:var(--amber-soft);color:var(--amber);cursor:pointer}
  .ev.milestone{background:rgba(27,31,39,.08);color:var(--ink2);cursor:pointer}
  .ev.post{cursor:pointer} .ev.experiment{cursor:pointer} .ev.feature{cursor:pointer}
  /* rail add buttons */
  .rail-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 8px 6px}
  .rail-hdr .label{padding:0}
  .add-btn{border:none;background:none;color:var(--dim);font-size:14px;cursor:pointer;padding:0 4px;line-height:1;border-radius:6px}
  .add-btn:hover{background:rgba(255,255,255,.6);color:var(--ink)}
  /* popup */
  .popup-bg{position:fixed;inset:0;z-index:45;background:rgba(20,24,33,.2);display:flex;align-items:center;justify-content:center}
  .popup{background:#fff;border:1px solid var(--gline);border-radius:20px;box-shadow:var(--shadow);width:min(420px,92vw);padding:22px 24px}
  .popup-close{float:right;border:none;background:none;font-size:18px;cursor:pointer;color:var(--dim);line-height:1}
  .popup h3{font:700 15px/1.2 var(--disp);margin:0 0 14px;padding-right:24px}
  .popup .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12.5px;margin-bottom:16px}
  .popup .mk{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .popup .mv{color:var(--ink2);font-weight:500}
  .popup .pacts{display:flex;gap:8px;flex-wrap:wrap}
  /* cal filter bar */
  .cal-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .kchip{font:600 10.5px/1 var(--body);padding:5px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--gline);background:rgba(255,255,255,.55);color:var(--dim)}
  .kchip.on{border-color:transparent}
  .kchip.k-post.on{background:var(--sky-soft);color:var(--sky)}
  .kchip.k-activity.on{background:var(--amber-soft);color:var(--amber)}
  .kchip.k-milestone.on{background:var(--graphite-soft);color:var(--ink2)}
  .kchip.k-experiment.on{background:rgba(124,92,214,.16);color:#7c5cd6}
  .kchip.k-feature.on{background:var(--teal-soft);color:var(--teal)}
  .kchip.k-all.on{background:var(--graphite);color:#fff;border-color:var(--graphite)}
</style>
<link rel="stylesheet" href="/vendor/xterm.css">
<script src="/vendor/xterm.js"></script>
<script src="/vendor/xterm-addon-fit.js"></script>
</head>
<body>
<div class="app" id="app">
  <aside class="panel side" id="rail"></aside>
  <div class="right-col">
    <section class="panel main" id="main"><div class="scroll"><div style="padding:30px;color:var(--dim)">loading…</div></div></section>
    <div class="panel term-panel" id="term-panel">
      <div class="tbar" id="term-tab"><span id="term-chevron">▸</span>&nbsp;Terminal
        <span class="thint">full claude · all skills</span>
        <button class="tclose" id="term-close" title="Toggle terminal">open ⌃`</button></div>
      <div class="term-mount" id="term"></div>
    </div>

<div id="toast" style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(27,31,39,.92);color:#fff;padding:10px 16px;border-radius:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30"></div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const slugify = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
function toast(m){const t=$("#toast");t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2400);}
function modal(title, innerHTML, onsubmit, opts={}){
  const bg=document.createElement("div"); bg.className="modal-bg";
  const saveLabel = opts.saveLabel||"Save";
  bg.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><form>${innerHTML}
    <div class="actions"><button type="button" class="btn" data-x>Cancel</button><button type="submit" class="btn primary">${saveLabel}</button></div></form></div>`;
  const close=()=>bg.remove();
  bg.querySelector("[data-x]").onclick=close;
  bg.onclick=e=>{ if(e.target===bg) close(); };
  bg.querySelector("form").onsubmit=async e=>{ e.preventDefault();
    const data={}; bg.querySelectorAll("[name]").forEach(i=>data[i.name]=i.value);
    try{ await onsubmit(data); close(); }catch(err){ toast("✗ "+err.message); } };
  document.body.appendChild(bg);
  const f=bg.querySelector("input,select,textarea"); if(f) f.focus();
}
function popup(title, metaPairs, actions){
  const bg=document.createElement("div"); bg.className="popup-bg";
  const meta=metaPairs.map(([k,v])=>`<div class="mk">${esc(k)}</div><div class="mv">${esc(v||"—")}</div>`).join("");
  const acts=actions.map(a=>`<button class="btn${a.primary?" primary":""}" data-pid="${esc(a.id||"")}">${esc(a.label)}</button>`).join("");
  bg.innerHTML=`<div class="popup"><button class="popup-close">✕</button><h3>${esc(title)}</h3>
    <div class="meta">${meta}</div>${acts?`<div class="pacts">${acts}</div>`:""}`;
  const close=()=>bg.remove();
  bg.querySelector(".popup-close").onclick=close;
  bg.onclick=e=>{ if(e.target===bg) close(); };
  bg.querySelectorAll("[data-pid]").forEach(b=>{ const a=actions.find(x=>(x.id||"")===(b.dataset.pid||""));
    if(a?.onclick) b.onclick=()=>{ close(); a.onclick(); }; });
  document.body.appendChild(bg);
}
async function api(p,o){const r=await fetch(p,o);const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||r.status);return j;}
function jpost(p,body){return api(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});}

const SECTIONS = [
  {key:"overview", ico:"◇", label:"Overview"},
  {key:"validation", ico:"◎", label:"Problem & validation"},
  {key:"experiments", ico:"⚗", label:"Experiments"},
  {key:"pricing", ico:"◧", label:"Positioning & pricing"},
  {key:"product", ico:"▣", label:"Product"},
];
let STATE = {view:"calendar", project:null, section:null, profile:null, channelGuidelines:null};
let _TREE = [];

// Rail fold state — which projects/profiles are expanded. Persisted so folds
// survive the full renderRail() that fires after every chat action / refresh.
const OPEN = loadOpen();
function loadOpen(){
  try{ const o = JSON.parse(localStorage.getItem("gtmos.rail.open") || "{}");
    return { projects:new Set(o.projects||[]), profiles:new Set(o.profiles||[]) }; }
  catch{ return { projects:new Set(), profiles:new Set() }; }
}
function saveOpen(){
  localStorage.setItem("gtmos.rail.open",
    JSON.stringify({ projects:[...OPEN.projects], profiles:[...OPEN.profiles] }));
}
// A node is open if it's in the OPEN set (persisted). Navigate actions below
// auto-add the parent to OPEN so navigating to a child keeps it visible,
// but the user can still manually collapse the parent afterwards.
function isOpen(kind, slug){
  if(kind === "projects") return OPEN.projects.has(slug);
  if(kind === "profiles") return OPEN.profiles.has(slug);
  return false;
}
function toggleOpen(kind, slug){
  const set = OPEN[kind];
  set.has(slug) ? set.delete(slug) : set.add(slug);
  saveOpen(); renderRail();
}

async function boot(){ await renderRail(); selectGlobal("calendar"); }

async function renderRail(){
  _TREE = await api("/api/tree");
  const projects = _TREE.map(p=>{
    const totalFeatures = p.products.reduce((n,prod)=>n+prod.features,0);
    const profileRows = p.profiles.length ? p.profiles.map(prof=>{
      const hasCh = prof.channels.length > 0;
      const profOpen = !hasCh || isOpen("profiles", prof.slug);
      const wedge = hasCh ? (profOpen ? "▾" : "▸") : "·";
      const channelsBlock = prof.channels.length ? `<div style="margin-left:10px;border-left:1px solid var(--hair);padding-left:8px;margin-top:1px">
        ${prof.channels.map(ch=>`<a data-profile="${esc(prof.slug)}" data-chan-filter="${esc(ch.slug)}" style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:8px;cursor:pointer"><span style="opacity:.5">${PLATFORM_ICON[ch.platform]||"⌗"}</span>${esc(ch.name||ch.platform)}</a>`).join("")}
        <a data-new-channel="${esc(prof.slug)}" style="font-size:11px;color:var(--sky);padding:4px 7px;cursor:pointer">＋ Channel</a>
      </div>` : `<div style="margin-left:10px;padding-left:8px"><a data-new-channel="${esc(prof.slug)}" style="font-size:11px;color:var(--sky);padding:4px 7px;cursor:pointer">＋ Channel</a></div>`;
      return `<div style="display:flex;align-items:center;gap:1px">
        <span data-toggle-profile="${esc(prof.slug)}" style="opacity:.55;font-size:9px;width:13px;text-align:center;cursor:pointer;padding:4px 0">${wedge}</span>
        <a data-profile="${esc(prof.slug)}" style="flex:1">${esc(prof.name)} <span class="c">${prof.posts}</span></a>
      </div>
      ${profOpen ? channelsBlock : ""}`;
    }).join("") : `<a style="color:var(--dim);font-size:12px;padding:4px 9px">No profiles yet</a>`;
    const pOpen = isOpen("projects", p.slug);
    return `
    <div style="margin-top:8px;padding:10px 9px 8px;border-radius:14px;background:rgba(255,255,255,.5);border:1px solid var(--gline)">
      <div data-toggle-project="${esc(p.slug)}" style="display:flex;align-items:center;gap:7px;font:700 13.5px/1 var(--disp);padding:2px 4px ${pOpen?"8px":"2px"};cursor:pointer">
        <span style="opacity:.55;font-size:10px;width:9px;display:inline-block">${pOpen?"▾":"▸"}</span>${esc(p.name)}
        <span class="tag" style="margin-left:auto;font:600 9px/1 var(--body);letter-spacing:.06em;text-transform:uppercase;color:var(--sky);background:var(--sky-soft);padding:3px 7px;border-radius:20px">${esc(p.kind||p.type)}</span></div>
      ${pOpen ? `<nav class="sec">
        ${SECTIONS.map(s=>`<a data-project="${esc(p.slug)}" data-section="${s.key}"><span class="ico">${s.ico}</span> ${esc(s.label)}${
          s.key==="experiments"&&p.experiments?`<span class="c">${p.experiments}</span>`:
          s.key==="product"&&totalFeatures?`<span class="c">${totalFeatures}</span>`:""}</a>`).join("")}
        <div class="grp" style="display:flex;align-items:center">Profiles
          <button class="add-btn" data-new-profile="${esc(p.slug)}" style="margin-left:auto" title="Add profile">＋</button></div>
        <div class="kid">${profileRows}</div>
      </nav>` : ""}
    </div>`;
  }).join("");
  $("#rail").innerHTML = `
    <div class="brand" id="brand-btn"><span class="mark"></span><b>GTM&nbsp;OS</b>
      <div class="brand-menu" id="brand-menu"><a id="quit-btn">Quit GTM OS</a></div>
    </div>
    <nav class="nav">
      <a data-view="needs"><span class="ico">◉</span> Needs you</a>
      <a data-view="calendar"><span class="ico">▦</span> Calendar</a>
      <a data-view="operations"><span class="ico">✓</span> Operations</a>
    </nav>
    <div class="rail-hdr"><span class="label">Projects</span>
      <button class="add-btn" id="new-project-btn" title="New project">＋</button></div>
    ${projects || '<div style="padding:8px 12px;color:var(--dim);font-size:12px">No projects yet — click ＋ to create one</div>'}
    `;
  $("#rail").querySelectorAll("[data-view]").forEach(a=>a.onclick=()=>selectGlobal(a.dataset.view));
  $("#rail").querySelectorAll("[data-section]").forEach(a=>a.onclick=()=>selectSection(a.dataset.project,a.dataset.section));
  $("#rail").querySelectorAll("[data-profile]").forEach(a=>a.onclick=e=>{ e.stopPropagation(); selectProfile(a.dataset.profile, a.dataset.chanFilter||null); });
  $("#rail").querySelectorAll("[data-new-profile]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openNewProfile(b.dataset.newProfile); });
  $("#rail").querySelectorAll("[data-new-channel]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openNewChannel(b.dataset.newChannel); });
  $("#rail").querySelectorAll("[data-toggle-project]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); toggleOpen("projects", el.dataset.toggleProject); });
  $("#rail").querySelectorAll("[data-toggle-profile]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); toggleOpen("profiles", el.dataset.toggleProfile); });
  $("#new-project-btn").onclick=e=>{ e.stopPropagation(); openNewProject(); };
  const brandMenu = $("#brand-menu");
  $("#brand-btn").onclick = e => { e.stopPropagation(); brandMenu.classList.toggle("open"); };
  document.addEventListener("click", () => brandMenu.classList.remove("open"));
  $("#quit-btn").onclick = () => { fetch("/quit").catch(()=>{}); setTimeout(()=>window.close(), 350); };
  highlight();
}

function openNewProject(){
  modal("New project",
    `<label>Name</label><input name="name" placeholder="My Venture" required>
     <label>Slug <span style="font-weight:400;text-transform:none">(auto-filled, editable)</span></label><input name="slug" placeholder="my-venture" required>
     <label>Kind</label><select name="kind"><option value="venture">Venture</option><option value="brand">Brand</option></select>
     <label>Priority</label><select name="priority"><option value="primary">Primary</option><option value="secondary">Secondary</option><option value="experiment">Experiment</option></select>
     <label>Status</label><select name="status"><option value="idea">Idea</option><option value="prototype">Prototype</option><option value="live">Live</option><option value="revenue">Revenue</option></select>`,
    async data=>{ await jpost("/api/project/new", data); if(data.slug){ OPEN.projects.add(data.slug); saveOpen(); } toast("Project created ✓"); renderRail(); },
    {saveLabel:"Create project"}
  );
  // auto-slug from name
  setTimeout(()=>{
    const n=document.querySelector(".modal [name=name]"), s=document.querySelector(".modal [name=slug]");
    if(n&&s){ n.oninput=()=>{ if(!s.dataset.manual) s.value=slugify(n.value); };

}

function openNewProfile(projectSlug){
  modal("New profile",
    `<label>Name</label><input name="name" placeholder="My Brand" required>
     <label>Slug <span style="font-weight:400;text-transform:none">(auto-filled)</span></label><input name="slug" placeholder="my-brand" required>
     <label>Topic / niche</label><input name="topic" placeholder="e.g. sustainable fashion for Gen-Z">`,
    async data=>{ await jpost(`/api/project/${projectSlug}/profile/new`, data); OPEN.projects.add(projectSlug); if(data.slug){ OPEN.profiles.add(data.slug); } saveOpen(); toast("Profile created ✓"); renderRail(); },
    {saveLabel:"Create profile"}
  );
  setTimeout(()=>{
    const n=document.querySelector(".modal [name=name]"), s=document.querySelector(".modal [name=slug]");
    if(n&&s){ n.oninput=()=>{ if(!s.dataset.manual) s.value=slugify(n.value); };
      s.oninput=()=>{ s.dataset.manual=s.value?"1":""; }; }
  },0);
}

function openNewChannel(profileSlug){
  modal("New channel",
    `<label>Platform</label>
     <select name="platform"><option value="instagram">Instagram</option><option value="tiktok">TikTok</option><option value="x">X / Twitter</option><option value="linkedin">LinkedIn</option><option value="youtube">YouTube</option><option value="facebook">Facebook</option></select>
     <label>Handle <span style="font-weight:400;text-transform:none">(optional)</span></label><input name="handle" placeholder="@handle">`,
    async data=>{ await jpost(`/api/profile/${profileSlug}/channel/new`, data); OPEN.profiles.add(profileSlug); saveOpen(); toast("Channel created ✓"); renderRail(); },
    {saveLabel:"Add channel"}
  );
}
function highlight(){
  document.querySelectorAll("#rail [data-view]").forEach(a=>a.classList.toggle("active",STATE.view===a.dataset.view&&!STATE.project&&!STATE.profile&&!STATE.channelGuidelines));
  document.querySelectorAll("#rail [data-section]").forEach(a=>a.classList.toggle("active",STATE.view==="section"&&STATE.project===a.dataset.project&&STATE.section===a.dataset.section));
  document.querySelectorAll("#rail [data-profile]").forEach(a=>a.classList.toggle("active",(STATE.view==="profile"||STATE.view==="profileSetup")&&STATE.profile===a.dataset.profile));
  document.querySelectorAll("#rail [data-chan-guidelines]").forEach(a=>a.classList.toggle("active",STATE.view==="channelGuidelines"&&STATE.channelGuidelines===a.dataset.chanGuidelines));
}
function selectGlobal(v){ STATE={view:v,project:null,section:null,profile:null,channelGuidelines:null}; highlight();
  if(v==="calendar") renderTimeline(); else if(v==="operations") renderOperations(); else renderNeeds(); }
function selectSection(project,section){
  OPEN.projects.add(project); saveOpen();
  STATE={view:"section",project,section,profile:null,channelGuidelines:null}; highlight(); renderProjectSection(project,section); }
function selectProfile(slug, chanFilter){
  const parentProj = _TREE.find(p=>p.profiles.some(pr=>pr.slug===slug));
  if(parentProj){ OPEN.projects.add(parentProj.slug); saveOpen(); }
  STATE={view:"profile",project:null,section:null,profile:slug,channelGuidelines:null}; highlight(); renderProfile(slug, chanFilter||null); }
function selectChannelGuidelines(slug){
  const parentProf = _TREE.flatMap(p=>p.profiles).find(pr=>pr.channels.some(c=>c.slug===slug));
  const parentProj = _TREE.find(p=>p.profiles.some(pr=>pr.channels.some(c=>c.slug===slug)));
  if(parentProf){ OPEN.profiles.add(parentProf.slug); }
  if(parentProj){ OPEN.projects.add(parentProj.slug); }
  if(parentProf||parentProj) saveOpen();
  STATE={view:"channelGuidelines",project:null,section:null,profile:null,channelGuidelines:slug}; highlight(); renderChannelGuidelines(slug); }

// Re-render the rail + the current center view (used after the chat agent
// mutates entities via osctl, so new/changed items appear without a reload).
async function refreshViews(){
  await renderRail();
  const v = STATE.view;
  if (v === "calendar") return renderTimeline();
  if (v === "operations") return renderOperations();
  if (v === "section") return renderProjectSection(STATE.project, STATE.section);
  if (v === "profile") return renderProfile(STATE.profile);
  if (v === "profileSetup") return renderProfileSetup(STATE.profile);
  if (v === "channelGuidelines") return renderChannelGuidelines(STATE.channelGuidelines);
  return renderNeeds();
}

async function renderNeeds(){ $("#main").innerHTML=`<div class="topbar"><div><div class="crumbs">Across everything</div><h1 class="title">Needs you</h1></div></div><div class="scroll"><div style="padding:24px 4px;color:var(--dim)">Your prioritized to-act list arrives in a later phase. For now, open a project section or a profile.</div></div>`; }

async function renderOperations(){
  const all = await api("/api/timeline");
  const items = all.filter(r=>r.kind==="activity");
  const statuses=["planned","running","blocked","done"];
  let FILT="active";
  function draw(){
    const list = FILT==="active" ? items.filter(r=>r.status!=="done") : FILT==="done" ? items.filter(r=>r.status==="done") : items;
    const projectOpts = _TREE.map(p=>`<option value="${esc(p.slug)}">${esc(p.name)}</option>`).join("");
    const rows = list.length ? list.map(r=>{
      const done=r.status==="done";
      return `<div class="post" style="${done?"opacity:.5":""}">
        <span class="stp ${done?"sched":"idea"}">${esc(r.status||"planned")}</span>
        <div class="t">${esc(r.title)}<small>${[r.entity_name||r.entity_slug, r.date].filter(Boolean).join(" · ")}</small></div>
        ${!done?`<button class="go" data-done-title="${esc(r.title)}" data-done-entity="${esc(r.entity_slug||"")}">Done ✓</button>`:""}
        <button class="more" data-ev='${JSON.stringify({...r,title:(r.title||"").slice(0,80)}).replace(/'/g,"&#39;")}'>Edit</button>
      </div>`;
    }).join("") : `<div style="padding:24px 4px;color:var(--dim)">Nothing here.</div>`;
    const active=items.filter(r=>r.status!=="done").length;
    $("#ops-list").innerHTML=`
      <div class="filters" style="margin-bottom:14px">
        <span class="chip${FILT==="active"?" on":""}" data-of="active">Active <span class="n">${active}</span></span>
        <span class="chip${FILT==="all"?" on":""}" data-of="all">All <span class="n">${items.length}</span></span>
        <span class="chip${FILT==="done"?" on":""}" data-of="done">Done <span class="n">${items.filter(r=>r.status==="done").length}</span></span>
      </div>
      <div class="rowc">${rows}</div>`;
    $("#ops-list").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ FILT=c.dataset.of; draw(); });
    $("#ops-list").querySelectorAll("[data-done-title]").forEach(b=>b.onclick=async()=>{
      try{ await jpost("/api/activity/done",{title:b.dataset.doneTitle,entity:b.dataset.doneEntity}); toast("Done ✓"); renderOperations(); }
      catch(e){ toast("✗ "+e.message); }
    });
    $("#ops-list").querySelectorAll("[data-ev]").forEach(el=>el.onclick=()=>{ try{openEvPopup(JSON.parse(el.dataset.ev));}catch(_){} });
  }
  const projectOpts2 = _TREE.map(p=>`<option value="${esc(p.slug)}">${esc(p.name)}</option>`).join("");
  $("#main").innerHTML=`
    <div class="topbar"><div><div class="crumbs">Across everything</div><h1 class="title">Operations</h1></div>
      <div style="margin-left:auto"><button class="btn primary" id="newOpBtn">＋ Activity</button></div></div>
    <div class="scroll"><div id="ops-list"></div></div>`;
  draw();
  $("#newOpBtn").onclick=()=>modal("New activity",
    `<label>Title</label><input name="title" required placeholder="e.g. Record intro video">
     <label>Project</label><select name="entity">${projectOpts2}</select>
     <label>Date</label><input name="date" type="date">
     <label>Type</label><select name="type"><option>task</option><option>meeting</option><option>call</option><option>review</option><option>launch</option></select>`,
    async d=>{ await jpost("/api/activity/new",d); toast("Activity added ✓"); renderOperations(); },{saveLabel:"Add"});
}
function plainStatus(s){ return ({planned:"Idea",approved_slot:"Idea",briefed:"Draft",approved:"Ready",scheduled:"Scheduled",published:"Published",rejected:"Archived"})[s]||s; }

async function renderProjectSection(slug, section){
  const p = await api(`/api/project/${slug}`);
  const title = (SECTIONS.find(s=>s.key===section)||{}).label || section;
  const memo = t => (p.memos.filter(m=>m.type===t).sort((a,b)=>b.version-a.version)[0]||null);
  const body = {
    overview: ()=>{
      const e=p.entity, pv=memo("problem-validation"), as=memo("assessment");
      const vb = pv&&pv.body||{}, ab = as&&as.body||{};
      return `<div class="grid2">
        ${kv("Stage", e.status)}${kv("Priority", e.priority)}${kv("Hours/week", e.hours_per_week??"—")}
        ${kv("Validation", vb.validation_status||"—")}${kv("Pace", ab.pace_recommendation||"—")}
        ${kv("Profiles", p.profiles.map(c=>c.name).join(", ")||"—")}</div>
        ${pv?card("Problem & validation", `Status: <b>${esc(vb.validation_status||"?")}</b> · ${esc(vb.recommendation||"")}`):""}
        ${ab.riskiest_assumption?card("Riskiest assumption", esc(ab.riskiest_assumption)):""}`;
    },
    validation: ()=>{ const m=memo("problem-validation"); if(!m) return empty("No problem-validation memo yet.");
      const b=m.body||{}; return card(`Problem-validation v${m.version}`,
        `Status: <b>${esc(b.validation_status||"?")}</b> · severity: ${esc(b.severity||"?")}<br>${esc(b.recommendation||"")}`); },
    pricing: ()=>{ const items=p.memos.filter(m=>["positioning","pricing","competitors","icp"].includes(m.type));
      return items.length? items.map(m=>card(`${m.type} v${m.version}`, esc((m.body&&(m.body.recommendation||m.body.summary))||m.status))).join("") : empty("No positioning/pricing memos yet."); },
    experiments: ()=> p.experiments.length? p.experiments.map(x=>card(esc(x.assumption),
        `Status: <b>${esc(x.status)}</b>${x.decision?` · decision: ${esc(x.decision)}`:""}`)).join("") : empty("No experiments yet."),
    product: ()=>{
      if(p.products&&p.products.length){
        const prodCards = p.products.map(prod=>{
          const feats = p.features.filter(f=>f.product_slug===prod.slug);
          return `<div class="pcard"><h4>${esc(prod.name)}</h4><div style="font-size:12px;color:var(--dim)">${feats.length} feature${feats.length!==1?"s":""} in roadmap</div>
            ${feats.length?`<div class="rowc" style="margin-top:10px">${feats.map(f=>`<div class="post" style="padding:9px 12px">
              <span class="stp draft">${esc(f.status)}</span>
              <div class="t" style="font-size:12px">${esc(f.title)}${f.target_date?`<small>${esc(f.target_date)}</small>`:""}</div></div>`).join("")}</div>`:""}</div>`;
        }).join("");
        return prodCards;
      }
      return p.features.length? listRows(p.features.map(f=>({pill:f.status, pillk:"draft", t:f.title, sub:[f.priority,f.target_date].filter(Boolean).join(" · ")}))) : empty("No products or roadmap features yet.");
    },
    operations: ()=> p.activities.length? listRows(p.activities.map(a=>({pill:a.status, pillk:a.status==="done"?"sched":"idea", t:a.title, sub:[a.type,a.date].filter(Boolean).join(" · ")}))) : empty("No operations/tasks for this project yet."),
  };

let CAL = (function(){ const d=new Date(); return {y:d.getFullYear(), m:d.getMonth(), filter:"all"}; })();
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
function calShift(delta){ let m=CAL.m+delta,y=CAL.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} CAL={...CAL,y,m}; renderTimeline(); }
function calToday(){ const d=new Date(); CAL={...CAL,y:d.getFullYear(),m:d.getMonth()}; renderTimeline(); }

function openEvPopup(r){
  const acts=[];
  if(r.kind==="activity"&&r.status!=="done") acts.push({id:"done",label:"Mark done ✓",primary:true,onclick:async()=>{
    toast("Saving…");
    try{ await jpost("/api/activity/done",{title:r.title,entity:r.entity_slug}); toast("Marked done ✓"); renderTimeline(); }
    catch(e){ toast("✗ "+e.message); }
  }});
  if(r.kind==="post") acts.push({id:"go",label:"Open post →",onclick:()=>selectProfile(r.entity_slug)});
  if(r.kind==="activity") acts.push({id:"del",label:"Delete",onclick:async()=>{
    if(!confirm(`Delete "${r.title}"?`)) return;
    try{ await jpost("/api/activity/delete",{title:r.title}); toast("Deleted ✓"); refreshViews(); }
    catch(e){ toast("✗ "+e.message); }
  }});
  popup(r.title||r.kind, [
    ["Type", r.kind],
    ["Entity", r.entity_name||r.entity_slug||"—"],
    ["Date", r.date||"—"],
    ["Status", r.status||"—"],
  ], acts);
}

async function renderTimeline(){
  const all = await api("/api/timeline");
  const kinds=["post","activity","milestone","experiment","feature"];
  const filtered = CAL.filter==="all" ? all : all.filter(r=>r.kind===CAL.filter);
  const byDay={}; filtered.forEach(r=>{ if(r.date){ (byDay[r.date]=byDay[r.date]||[]).push(r); } });
  const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const today=iso(new Date());
  const first=new Date(CAL.y,CAL.m,1), lead=(first.getDay()+6)%7, start=new Date(CAL.y,CAL.m,1-lead);
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i), k=iso(d), out=d.getMonth()!==CAL.m;
    const evs=(byDay[k]||[]).map(r=>`<div class="ev ${esc(r.kind)}" data-ev='${JSON.stringify({...r,title:(r.title||"").slice(0,80)}).replace(/'/g,"&#39;")}'>${esc(r.title||r.kind)}</div>`).join("");
    cells+=`<div class="day${out?" out":""}${k===today?" today":""}"><div class="n">${d.getDate()}</div>${evs}</div>`;
    if(i>=34&&d.getMonth()!==CAL.m&&(i+1)%7===0) break;
  }
  const counts=k=>all.filter(r=>r.kind===k).length;
  const chips=[["all","All",all.length],...kinds.map(k=>[k,k[0].toUpperCase()+k.slice(1)+"s",counts(k)])]
    .map(([k,l,n])=>`<span class="kchip k-${k}${CAL.filter===k?" on":""}" data-kf="${k}">${l} <span style="opacity:.6">${n}</span></span>`).join("");
  const dow=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(x=>`<div class="dow">${x}</div>`).join("");
  const projectOpts = _TREE.map(p=>`<option value="${esc(p.slug)}">${esc(p.name)}</option>`).join("");
  $("#main").innerHTML=`
    <div class="topbar"><div><div class="crumbs">Across everything</div><h1 class="title">Calendar</h1></div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" id="newActBtn">＋ Activity</button>
        <button class="btn" id="newMsBtn">＋ Milestone</button>
      </div></div>
    <div class="scroll">
      <div class="cal-filters">${chips}</div>
      <div class="cal-head"><span class="mlabel">${MONTHS[CAL.m]} ${CAL.y}</span>
        <div class="cal-nav"><button id="cprev">‹</button><button id="ctoday">Today</button><button id="cnext">›</button></div></div>
      <div class="cal">${dow}${cells}</div></div>`;
  $("#cprev").onclick=()=>calShift(-1); $("#cnext").onclick=()=>calShift(1); $("#ctoday").onclick=calToday;
  $("#main").querySelectorAll(".kchip").forEach(c=>c.onclick=()=>{ CAL.filter=c.dataset.kf; renderTimeline(); });
  $("#main").querySelectorAll("[data-ev]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); try{openEvPopup(JSON.parse(el.dataset.ev));}catch(_){} });
  $("#newActBtn").onclick=()=>modal("New activity",
    `<label>Title</label><input name="title" required placeholder="e.g. Record intro video">
     <label>Project</label><select name="entity">${projectOpts}</select>
     <label>Date</label><input name="date" type="date">
     <label>Type</label><select name="type"><option>task</option><option>meeting</option><option>call</option><option>review</option><option>launch</option></select>`,
    async d=>{ await jpost("/api/activity/new",d); toast("Activity added ✓"); renderTimeline(); },{saveLabel:"Add"});
  $("#newMsBtn").onclick=()=>modal("New milestone",
    `<label>Title</label><input name="title" required placeholder="e.g. Launch v1">
     <label>Date</label><input name="date" type="date" required>
     <label>Project</label><select name="entity">${projectOpts}</select>
     <label>Notes</label><input name="notes" placeholder="optional">`,
    async d=>{ await jpost("/api/milestone/new",d); toast("Milestone added ✓"); renderTimeline(); },{saveLabel:"Add"});
}

                          fontSize: 12, theme: { background: "#1e1e28" } });
    termFit = new FitAddon.FitAddon();
    term.loadAddon(termFit);
    term.open(document.getElementById("term"));
    termFit.fit();
    termSock = new WebSocket(`ws://${location.host}/ws/terminal`);
    termSock.binaryType = "arraybuffer";
    termSock.onopen = () => sendResize();
    termSock.onmessage = e => term.write(new Uint8Array(e.data));
    termSock.onclose = () => { if (term) term.write("\r\n[session ended — toggle the terminal to reconnect]\r\n"); };
    term.onData(d => { if (termSock && termSock.readyState === 1) termSock.send(d); });
    window.addEventListener("resize", () => { if (termFit) { termFit.fit(); sendResize(); } });
  }
  function sendResize(){
    if (termSock && termSock.readyState === 1 && term)
      termSock.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
  }
  function toggleTerminal(){
    const panel = document.getElementById("term-panel");
    const opening = panel.classList.toggle("open");
    document.getElementById("term-chevron").textContent = opening ? "▾" : "▸";
    document.getElementById("term-close").textContent = opening ? "close" : "open ⌃`";
    if (opening && !term) initTerminal();
    // fit after the height transition settles, else xterm sizes to 0 rows
    if (opening) setTimeout(() => { if (termFit) { termFit.fit(); sendResize(); } }, 160);
  }
  document.getElementById("term-tab").onclick   = e => { if (!e.target.closest("#term-close")) toggleTerminal(); };
  document.getElementById("term-close").onclick = e => { e.stopPropagation(); toggleTerminal(); };
  // Cursor-style toggle: Ctrl+`
  document.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "`") { e.preventDefault(); toggleTerminal(); }
  });

  // ── file attachments ─────────────────────────────────────────────────────
  let attachedFiles = [];
  attachBtn.onclick = () => fileInput.click();
  fileInput.onchange = async e => {
    for (const file of e.target.files) {
      let content;
      try { content = await file.text(); } catch { content = `[binary: ${file.name}]`; }
      attachedFiles.push({ name: file.name, content });
    }
    fileInput.value = "";
    renderAttachments();
  };
  function renderAttachments(){
    attachEl.innerHTML = attachedFiles.map((f, i) =>
      `<span class="att-chip">${esc(f.name)}<button data-ai="${i}" title="Remove">✕</button></span>`
    ).join("");
    attachEl.querySelectorAll("[data-ai]").forEach(b =>
      b.onclick = () => { attachedFiles.splice(+b.dataset.ai, 1); renderAttachments(); }
    );
  }

  // ── chat ─────────────────────────────────────────────────────────────────
  const history = [];
  let busy = false;

  function addMsg(role, text){
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "me" : "ai");
    div.innerHTML = `<div class="b"></div>`;
    div.querySelector(".b").textContent = text;
    stream.appendChild(div);
    stream.scrollTop = stream.scrollHeight;
    return div.querySelector(".b");
  }

  function addChip(text){
    const c = document.createElement("div");
    c.className = "tool-chip"; c.textContent = text;
    stream.appendChild(c);
    stream.scrollTop = stream.scrollHeight;
  }

  function buildContext(){
    const title = document.querySelector(".title");
    const crumbs = document.querySelector(".crumbs");
    let ctx = "";
    if (crumbs) ctx += "Current view: " + crumbs.textContent + "\n";
    if (title)  ctx += "Section: " + title.textContent + "\n";
    if (attachedFiles.length) {
      ctx += "\n## Attached files\n" + attachedFiles.map(f =>
        `### ${f.name}\n\`\`\`\n${f.content}\n\`\`\``
      ).join("\n\n");
    }
    return ctx;
  }

  async function send(){
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true;
    input.value = "";
    input.style.height = "42px";
    statusEl.textContent = "thinking…";
    sendBtn.disabled = true;

    const fileNote = attachedFiles.length ? ` [+${attachedFiles.length} file${attachedFiles.length>1?"s":""}]` : "";
    history.push({ role: "user", content: text });
    addMsg("user", text + fileNote);

    const ctx = buildContext();
    attachedFiles = []; renderAttachments();

    const bubble = addMsg("assistant", ""); bubble.textContent = ""; let full = "";

    try {
      const resp = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, context: ctx })
      });

      if (!resp.ok) {
        const j = await resp.json().catch(() => ({}));
        bubble.textContent = "Error: " + (j.error || resp.status);
        history.pop(); return;
      }

      const reader = resp.body.getReader();
      const dec = new TextDecoder(); let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n"); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const obj = JSON.parse(raw);
            if (obj.error) { bubble.textContent = "Error: " + obj.error; return; }
            if (obj.delta) { full += obj.delta; bubble.textContent = full; stream.scrollTop = stream.scrollHeight; }
            if (obj.tool)  { addChip("⚙ " + obj.tool); }
          } catch {}
        }
      }

      if (full) history.push({ role: "assistant", content: full });
      statusEl.textContent = "Ready";
    } catch(e) {
      bubble.textContent = "Error: " + e.message;
      history.pop(); statusEl.textContent = "Error";
    } finally {
      busy = false; sendBtn.disabled = false; input.focus();
      refreshViews().catch(()=>{});   // act directly → show result
    }
  }

  sendBtn.onclick = send;
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  addMsg("assistant", "Hi — I run your GTM OS. Ask me to create or change things (projects, profiles, channels, posts, activities, milestones) and I'll do it directly and refresh the view. For power work, open the terminal with ⌃` .");
})();

boot();
</script>
</body>
</html>
